{% load static %}
{% with current_view=request.resolver_match.view_name %}
<header class="border-bottom bg-white py-3 mb-4 shadow-sm">
  <div class="container d-flex flex-wrap justify-content-between align-items-center">
    <ul class="nav nav-pills">
      <li class="nav-item">
        <a class="nav-link {% if current_view == 'blog:index' %}active{% endif %}" href="{% url 'blog:index' %}">Главная</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if current_view == 'pages:about' %}active{% endif %}" href="{% url 'pages:about' %}">О проекте</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if current_view == 'pages:rules' %}active{% endif %}" href="{% url 'pages:rules' %}">Правила сайта</a>
      </li>
    </ul>
    <span class="fs-4 fw-bold text-primary">Блогикум</span>
  </div>
</header>
{% endwith %}
