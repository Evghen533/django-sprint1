{% extends "base.html" %}

{% block title %}Категория: {{ slug }}{% endblock %}

{% block content %}
  <h1>Категория: {{ slug }}</h1>

  {% for post in posts %}
    <article class="my-5 p-4 border rounded shadow-sm bg-white">
      <header class="mb-3">
        <h2 class="h4">
          <a href="{% url 'blog:post_detail' post.id %}" class="text-decoration-none">
            {{ post.location }}
          </a>
        </h2>
        <small class="text-muted">Дата: {{ post.date }}</small>
      </header>

      <p class="lead">{{ post.text }}</p>

      <footer class="mt-3">
        <a href="{% url 'blog:category_posts' post.category %}" class="badge bg-secondary">
          Категория: {{ post.category }}
        </a>
      </footer>
    </article>
  {% endfor %}
{% endblock %}
